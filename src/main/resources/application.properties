spring.application.name=Suwinet Simulator Ritense
logging.level.root=INFO
server.port=8090
simulator.username=${SUWINET_USER}
simulator.password=${SUWINET_PASSWORD}

# Response editor: filesystem path where the response XML files live.
# Edits made via the editor are written here directly. Defaults to the source
# tree so changes survive a Gradle rebuild. Override in production/Docker to
# point at a mounted volume.
simulator.responses.path=classpath:suwinet/data/Responses
